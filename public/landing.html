<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shizuka Piano - Nghệ Thuật Cổ Điển</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts: Playfair Display for classic Serif -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Playfair Display', serif;
            background-color: #121212;
            /* Onyx Black */
            color: #FFFFF0;
            /* Ivory */
        }

        .hero-bg {
            /* Giảm độ tối để nhìn rõ hình ảnh cây đàn hơn */
            background-image: linear-gradient(to bottom, rgba(18, 18, 18, 0.1), rgba(18, 18, 18, 0.5)), url('/images/hero.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .text-gold {
            color: #D4AF37;
            /* Metallic Gold */
        }

        .bg-gold {
            background-color: #D4AF37;
        }

        .border-gold {
            border-color: #D4AF37;
        }

        .btn-hover:hover {
            background-color: #ebd076;
            color: #121212;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col hero-bg">

    <!-- Navbar -->
    <nav class="w-full p-6 md:p-10 flex justify-between items-center z-10 relative">
        <div class="tracking-wider">
            <a href="/"><img src="/images/logo.png" alt="Shizuka Piano Logo" class="h-12 object-contain"></a>
        </div>
        <div>
            <a href="/admin"
                class="text-sm tracking-widest text-[#FFFFF0] hover:text-gold transition duration-300 uppercase">Quản
                trị</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center px-4 z-10 relative text-center">
        <h1 class="text-5xl md:text-7xl font-bold mb-6 tracking-wide text-gold drop-shadow-lg">
            SHIZUKA PIANO
        </h1>

        <div class="mb-10 w-full max-w-3xl px-4 animate-fade-in-up">
            <img src="/images/banner.png" alt="Shizuka Piano Banner" class="w-full h-auto rounded-xl shadow-2xl border border-gold/40">
        </div>

        <div class="flex flex-col sm:flex-row gap-6">
            <a href="/signup"
                class="border border-gold text-gold px-10 py-4 text-lg tracking-widest uppercase transition-all duration-300 btn-hover">
                Đăng ký học ngay
            </a>
            <a href="#about"
                class="border border-transparent text-[#FFFFF0] px-10 py-4 text-lg tracking-widest uppercase transition-all duration-300 hover:text-gold">
                Tìm hiểu thêm
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full p-6 text-center text-sm text-gray-500 z-10 relative tracking-widest">
        &copy; 2026 SHIZUKA PIANO. ALL RIGHTS RESERVED.
    </footer>

</body>

</html>
